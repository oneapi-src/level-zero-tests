name: CI on 'infra' branch

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  trigger:
    runs-on: [self-hosted, gfx-small, Linux]
    steps:
    - uses: actions/checkout@v7
      with:
        ref: infra
    - uses: ./.github/actions/trigger-infra-ci
      with:
        branch: infra
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        concurrency_key: ${{ github.ref }}
        github_token: ${{ secrets.REPO_TOKEN }}
        is_master: ${{ github.ref_name == 'master' && 'true' || 'false' }}

  trigger-code-review:
    runs-on: [self-hosted, gfx-small, Linux]
    steps:
    - uses: actions/checkout@v7
      with:
        ref: infra
    - uses: ./.github/actions/trigger-infra-ci
      with:
        workflow_file: code-review.yml
        status_context: 'Code Review'
        status_prefix: 'code-review'
        branch: infra
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        concurrency_key: ${{ github.ref }}
        github_token: ${{ secrets.REPO_TOKEN }}
        is_master: ${{ github.ref_name == 'master' && 'true' || 'false' }}
        pr_number: ${{ github.event.pull_request.number }}
